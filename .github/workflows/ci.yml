name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per AGENTS.md § Agent parameters, branch protection requires THREE checks
# with these EXACT names. Don't rename without updating AGENTS.md and the
# protected-branches rule.
#
#   - lint        ESLint + backlog integrity
#   - unit-tests  vitest
#   - e2e-tests   Playwright (chromium + mobile-webkit) against a real local
#                 Supabase seeded by supabase/seed.sql

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint + backlog integrity (npm run lint)
        run: npm run lint
      - name: TypeScript (tsc --noEmit)
        run: npm run typecheck

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: vitest
        run: npm run test

  e2e-tests:
    name: e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Capture Supabase URL + keys into the env
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            --override-name db.url=SUPABASE_DB_URL \
            >> "$GITHUB_ENV"

      - name: Reset database (drop + re-apply migrations)
        run: supabase db reset --no-seed

      - name: Apply supabase/seed.sql via psql
        run: psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/seed.sql

      - name: Build Next.js
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Playwright (chromium + mobile-webkit)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npx playwright test --project=chromium --project=mobile-webkit

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
